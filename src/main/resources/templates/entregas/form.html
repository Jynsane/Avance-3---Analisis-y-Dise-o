<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Entrega - Transportes Shalom</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header>
        <h1>SHALOM LOGISTICS - TRANSPORTE</h1>
        <div class="user-info">
            <a th:href="@{/entregas}">Volver a Entregas</a>
            <a th:href="@{/dashboard}">Panel Principal</a>
        </div>
    </header>

    <div class="container">
        <div class="form-container">
            <h2>Registrar Entrega Física / Incidencia</h2>
            <p style="color: #666; margin-bottom: 1.5rem;">Confirme si el paquete se entregó correctamente o registre cualquier inconveniente para el envío <strong th:text="${envio.codSeguimiento}">SH-00000</strong></p>
            <hr style="margin-bottom: 1.5rem; border: 0; border-top: 1px solid #eee;">

            <form th:action="@{/entregas/guardar}" method="post">
                <input type="hidden" name="idEnvio" th:value="${envio.codEnvio}">

                <div class="form-group">
                    <label>Remitente / Cliente</label>
                    <input type="text" class="form-control" th:value="${envio.cliente.nombreCompleto}" readonly>
                </div>

                <div class="form-group">
                    <label>Destino</label>
                    <input type="text" class="form-control" th:value="${envio.destino}" readonly>
                </div>

                <div class="form-group">
                    <label>Descripción del Paquete</label>
                    <input type="text" class="form-control" th:value="${envio.encomienda.descripcion}" readonly>
                </div>

                <div class="form-group">
                    <label for="accion">Acción / Estado de Entrega</label>
                    <select id="accion" name="accion" class="form-control" onchange="toggleIncidencia(this.value)" required>
                        <option value="ENTREGADO">Entregado a Destinatario (Con éxito)</option>
                        <option value="INCIDENCIA">Registrar Incidencia (Cliente Ausente / Error de Dirección)</option>
                    </select>
                </div>

                <div class="form-group" id="grupoIncidencia" style="display: none;">
                    <label for="detalleIncidencia">Detalle de la Incidencia</label>
                    <textarea id="detalleIncidencia" name="detalleIncidencia" class="form-control" placeholder="Describa el motivo por el cual no se pudo entregar el paquete..." rows="3"></textarea>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Registrar</button>
                    <a th:href="@{/entregas}" class="btn btn-secondary" style="flex: 1;">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleIncidencia(val) {
            const grupo = document.getElementById('grupoIncidencia');
            const txt = document.getElementById('detalleIncidencia');
            if (val === 'INCIDENCIA') {
                grupo.style.display = 'block';
                txt.required = true;
            } else {
                grupo.style.display = 'none';
                txt.required = false;
                txt.value = '';
            }
        }
    </script>
</body>
</html>
