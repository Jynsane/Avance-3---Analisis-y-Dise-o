<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Ruta - Transportes Shalom</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fa-solid fa-truck-fast"></i> SHALOM LOGISTICS</h1>
        <div class="user-info">
            <a th:href="@{/rutas}" class="nav-link"><i class="fa-solid fa-list-ul"></i> Volver a Rutas</a>
            <a th:href="@{/dashboard}" class="nav-link"><i class="fa-solid fa-gauge"></i> Principal</a>
        </div>
    </header>

    <div class="container">
        <div class="form-container">
            <h2>
                <i class="fa-solid fa-route" style="color: var(--primary-color);"></i>
                <span th:text="${ruta.idRuta == null ? 'Registrar Nueva Ruta' : 'Editar Ruta'}">Formulario de Ruta</span>
            </h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">Asigne el conductor y la placa correspondiente a una agencia de llegada.</p>
            <hr style="margin-bottom: 2rem; border: 0; border-top: 1px solid var(--border-color);">

            <div th:if="${error}" class="alert alert-danger">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/rutas/guardar}" th:object="${ruta}" method="post">
                <input type="hidden" th:field="*{idRuta}">

                <div class="form-group">
                    <label for="placaVehiculo"><i class="fa-solid fa-truck"></i> Placa del Vehículo *</label>
                    <input type="text" id="placaVehiculo" th:field="*{placaVehiculo}" class="form-control" placeholder="E.g. V7X-984" required>
                    <div class="error-msg" th:if="${#fields.hasErrors('placaVehiculo')}">
                        <i class="fa-solid fa-circle-xmark"></i> <span th:errors="*{placaVehiculo}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="choferAsignado"><i class="fa-solid fa-id-card-clip"></i> Conductor Asignado *</label>
                    <input type="text" id="choferAsignado" th:field="*{choferAsignado}" class="form-control" placeholder="Nombre completo del conductor" required>
                    <div class="error-msg" th:if="${#fields.hasErrors('choferAsignado')}">
                        <i class="fa-solid fa-circle-xmark"></i> <span th:errors="*{choferAsignado}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="agenciaDestino"><i class="fa-solid fa-city"></i> Agencia de Destino *</label>
                    <input type="text" id="agenciaDestino" th:field="*{agenciaDestino}" class="form-control" placeholder="Ciudad o Sucursal principal de llegada" required>
                    <div class="error-msg" th:if="${#fields.hasErrors('agenciaDestino')}">
                        <i class="fa-solid fa-circle-xmark"></i> <span th:errors="*{agenciaDestino}"></span>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2.5rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">
                        <i class="fa-solid fa-floppy-disk"></i> Guardar Ruta
                    </button>
                    <a th:href="@{/rutas}" class="btn btn-secondary" style="flex: 1;">
                        <i class="fa-solid fa-xmark"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
