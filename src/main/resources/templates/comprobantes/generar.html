<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generar Comprobante - Transportes Shalom</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fa-solid fa-truck-fast"></i> SHALOM LOGISTICS</h1>
        <div class="user-info">
            <a th:href="@{/envios}" class="nav-link"><i class="fa-solid fa-list-ul"></i> Volver a Envíos</a>
            <a th:href="@{/dashboard}" class="nav-link"><i class="fa-solid fa-gauge"></i> Principal</a>
        </div>
    </header>

    <div class="container">
        <div class="form-container">
            <h2>
                <i class="fa-solid fa-receipt" style="color: var(--primary-color);"></i> Emitir Comprobante de Pago
            </h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">
                Seleccione el tipo de documento a emitir para el envío <strong th:text="${envio.codSeguimiento}">SH-00000</strong>.
            </p>
            <hr style="margin-bottom: 2rem; border: 0; border-top: 1px solid var(--border-color);">

            <form th:action="@{/comprobantes/generar}" method="post">
                <input type="hidden" name="idEnvio" th:value="${envio.codEnvio}">

                <div class="form-group">
                    <label>Adquiriente / Razón Social</label>
                    <input type="text" class="form-control" th:value="${envio.cliente.nombreCompleto}" readonly style="background-color: #f1f5f9; font-weight: 600;">
                </div>

                <div class="form-group">
                    <label>DNI / RUC del Adquiriente</label>
                    <input type="text" class="form-control" th:value="${envio.cliente.dniRuc}" readonly style="background-color: #f1f5f9; font-weight: 600;">
                </div>

                <div class="form-group">
                    <label>Monto Total a Facturar</label>
                    <input type="text" class="form-control" th:value="${'S/ ' + envio.costoTotal}" readonly style="font-weight: 800; color: var(--primary-color); font-size: 1.25rem;">
                </div>

                <div class="form-group">
                    <label for="tipoDocumento"><i class="fa-solid fa-file-signature"></i> Tipo de Documento *</label>
                    <select id="tipoDocumento" name="tipoDocumento" class="form-control" required>
                        <option value="Boleta">Boleta de Venta Electrónica</option>
                        <option value="Factura">Factura Electrónica</option>
                    </select>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2.5rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">
                        <i class="fa-solid fa-circle-check"></i> Emitir e Imprimir
                    </button>
                    <a th:href="@{/envios/ver/{id}(id=${envio.codEnvio})}" class="btn btn-secondary" style="flex: 1;">
                        <i class="fa-solid fa-arrow-left"></i> Volver a Detalles
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
