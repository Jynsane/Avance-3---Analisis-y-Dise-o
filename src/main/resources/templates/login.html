<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Transportes Shalom</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <h2><i class="fa-solid fa-truck-fast"></i> SHALOM<span>LOGISTICS</span></h2>
        <div th:if="${error}" class="alert alert-danger">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span th:text="${error}"></span>
        </div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username"><i class="fa-solid fa-user"></i> Usuario</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Ingrese su usuario" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Ingresar al Sistema
            </button>
        </form>
        <hr style="margin: 2rem 0; border: 0; border-top: 1px solid #e2e8f0;">
        <div style="text-align: center;">
            <p style="margin-bottom: 0.75rem; font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">¿Eres cliente y quieres realizar un rastreo?</p>
            <a th:href="@{/tracking/public}" class="btn btn-secondary" style="width: 100%;">
                <i class="fa-solid fa-magnifying-glass-location"></i> Seguimiento de Envíos
            </a>
        </div>
    </div>
</body>
</html>
