<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Cliente - Transportes Shalom</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header>
        <h1>SHALOM LOGISTICS - CLIENTES</h1>
        <div class="user-info">
            <a th:href="@{/clientes}">Volver a la Lista</a>
            <a th:href="@{/dashboard}">Panel Principal</a>
        </div>
    </header>

    <div class="container">
        <div class="form-container">
            <h2 th:text="${cliente.idCliente == null ? 'Registrar Nuevo Cliente' : 'Editar Cliente'}">Formulario</h2>
            <hr style="margin-bottom: 1.5rem; border: 0; border-top: 1px solid #eee;">

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">
                <input type="hidden" th:field="*{idCliente}">

                <div class="form-group">
                    <label for="dniRuc">DNI / RUC</label>
                    <input type="text" id="dniRuc" th:field="*{dniRuc}" class="form-control" placeholder="Ingrese el DNI o RUC del cliente" required>
                    <div class="error-msg" th:if="${#fields.hasErrors('dniRuc')}" th:errors="*{dniRuc}"></div>
                </div>

                <div class="form-group">
                    <label for="nombreCompleto">Nombre Completo</label>
                    <input type="text" id="nombreCompleto" th:field="*{nombreCompleto}" class="form-control" placeholder="Ingrese los nombres y apellidos" required>
                    <div class="error-msg" th:if="${#fields.hasErrors('nombreCompleto')}" th:errors="*{nombreCompleto}"></div>
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" th:field="*{telefono}" class="form-control" placeholder="Número de contacto" required>
                    <div class="error-msg" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" th:field="*{direccion}" class="form-control" placeholder="Dirección de domicilio" required>
                    <div class="error-msg" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></div>
                </div>

                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" th:field="*{correo}" class="form-control" placeholder="ejemplo@correo.com">
                    <div class="error-msg" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Guardar</button>
                    <a th:href="@{/clientes}" class="btn btn-secondary" style="flex: 1;">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
