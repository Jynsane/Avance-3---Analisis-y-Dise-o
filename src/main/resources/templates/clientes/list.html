<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes - Transportes Shalom</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header>
        <h1>SHALOM LOGISTICS - CLIENTES</h1>
        <div class="user-info">
            <a th:href="@{/dashboard}">Panel Principal</a>
            <a th:href="@{/logout}">Cerrar Sesión</a>
        </div>
    </header>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2>Lista de Clientes Registrados</h2>
            <a th:href="@{/clientes/nuevo}" class="btn btn-primary">Registrar Nuevo Cliente</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>DNI/RUC</th>
                        <th>Nombre Completo</th>
                        <th>Teléfono</th>
                        <th>Dirección</th>
                        <th>Correo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${clientes}">
                        <td th:text="${c.idCliente}">1</td>
                        <td th:text="${c.dniRuc}">12345678</td>
                        <td th:text="${c.nombreCompleto}">Juan Pérez</td>
                        <td th:text="${c.telefono}">999888777</td>
                        <td th:text="${c.direccion}">Av. Larco 123</td>
                        <td th:text="${c.correo}">juan@gmail.com</td>
                        <td>
                            <a th:href="@{/clientes/editar/{id}(id=${c.idCliente})}" class="btn btn-success" style="padding: 0.25rem 0.5rem; font-size: 0.85rem;">Editar</a>
                            <a th:href="@{/clientes/eliminar/{id}(id=${c.idCliente})}" class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.85rem;" onclick="return confirm('¿Está seguro de eliminar este cliente?')">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(clientes)}">
                        <td colspan="7" style="text-align: center; color: #888;">No hay clientes registrados en el sistema.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
